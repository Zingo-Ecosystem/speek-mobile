name: Build APK

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Flutter Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.jks

      - name: Create key.properties
        run: |
          {
            echo "storePassword=${{ secrets.STORE_PASSWORD }}"
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}"
            echo "keyAlias=${{ secrets.KEY_ALIAS }}"
            echo "storeFile=release.jks"
          } > android/key.properties

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          BUILD=$(echo $GITHUB_RUN_NUMBER)
          echo "name=v${VERSION}-build${BUILD}" >> "$GITHUB_OUTPUT"

      - name: Build universal APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/speek.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: speek-apk-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/speek.apk
          retention-days: 30

      - name: Delete existing latest release
        run: gh release delete latest --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build (${{ steps.version.outputs.name }})"
          body: |
            Oxirgi build: `${{ steps.version.outputs.name }}`
            Commit: ${{ github.sha }}
          files: build/app/outputs/flutter-apk/speek.apk
          make_latest: true
