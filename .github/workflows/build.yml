name: Build APK

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Flutter Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.jks

      - name: Create key.properties
        run: |
          {
            echo "storePassword=${{ secrets.STORE_PASSWORD }}"
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}"
            echo "keyAlias=${{ secrets.KEY_ALIAS }}"
            echo "storeFile=release.jks"
          } > android/key.properties

      - name: Get version from pubspec
        id: version
        run: |
          # pubspec version looks like "1.0.0+1"; keep the name part, drop +meta.
          RAW=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          VERSION="${RAW%%+*}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          # Unique, increasing per-push identifiers.
          echo "name=v${VERSION}-build${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}-build${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Build universal APK
        # --build-number bumps the Android versionCode on every push so each
        # release carries a new, increasing version.
        run: flutter build apk --release --build-number=${GITHUB_RUN_NUMBER} --build-name=${{ steps.version.outputs.version }}

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/speek-${{ steps.version.outputs.name }}.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: speek-apk-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/speek-${{ steps.version.outputs.name }}.apk
          retention-days: 30

      - name: Create release
        # A brand-new release on every push, tagged with the unique build name
        # and marked as the latest. Old releases are kept so you have history.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Speek ${{ steps.version.outputs.name }}"
          body: |
            Build: `${{ steps.version.outputs.name }}`
            Commit: ${{ github.sha }}
          files: build/app/outputs/flutter-apk/speek-${{ steps.version.outputs.name }}.apk
          make_latest: true
